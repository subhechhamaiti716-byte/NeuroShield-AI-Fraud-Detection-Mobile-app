version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - neuroshield-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  # Mobile (Web Preview)
  mobile:
    build: ./mobile
    ports:
      - "19006:19006"
    volumes:
      - ./mobile:/app
      - /app/node_modules
    command: npx expo start --web
    profiles:
      - web-demo

volumes:
  neuroshield-data:
